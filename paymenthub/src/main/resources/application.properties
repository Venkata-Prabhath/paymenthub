spring.application.name=paymenthub

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/paymenthub
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Port
server.port=8081

# JWT Security Configuration
# (This is a secure, Base64-encoded 256-bit token string)
jwt.secret=YjM2OTU3NGY0ZTM2ZGUwM2M5YjkyYTM1YjI1YzVjMTg0Y2I0ZDg0NTY3YTkwYmU0YTBlN2U0ZTkzMmI0YmE2Zg==
jwt.expiration=86400000

# Redis Cache Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379